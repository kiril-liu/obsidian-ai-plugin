name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format source
        run: npx prettier --write "src/**/*.ts" "*.json" "*.md" "*.css"

      - name: Build plugin
        run: npm run build

      - name: Create release package
        run: |
          mkdir release
          cp main.js manifest.json styles.css release/
          cd release
          zip obsidian-ai-copilot.zip main.js manifest.json styles.css

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
            release/obsidian-ai-copilot.zip
        env:
          GITHUB_TOKEN: $ secrets.GITHUB_TOKEN 